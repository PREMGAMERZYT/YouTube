<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>(1)YouTube Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>
    <nav>
        <div class="rightside">
            <div class="bars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <div class="logo">
                <div class="ytlogo">
                    <div class="redbox">
                        <div class="play"></div>
                    </div>
                </div>
                <div class="texts">
                    <p class="Yt">YouTube</p>
                    <div class="in">
                        <p>IN</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="middeleside">
            <div class="searchbar">
                <input type="text" name="search" id="search" placeholder="Search">
                <button id="seacrh-button"><i class="fa-brands fa-sistrix fa-2xl"></i></button>
            </div>
            <div class="voiceicon">
                <i class="fa-solid fa-microphone fa-xl"></i>
            </div>
        </div>
        <div class="leftside">
            <div class="createbutton">
                <div class="plusicon">
                    <i class="fa-solid fa-plus fa-lg"></i>
                </div>
                <div class="createText">
                    <p>Create</p>
                </div>
            </div>
            <div class="bell">
                <i class="fa-solid fa-bell"></i>
            </div>
            <div class="channel-logo">
                <i class="fa-regular fa-circle-user fa-xl"></i>
            </div>
        </div>
    </nav>

    <script src="js/script.js"></script>
</body>

</html>
